<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>My Website</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>My Service</h1>


<nav>

<a href="#">Home</a>

<a href="#">서비스</a>

<a href="#">소개</a>

<a href="#">문의</a>

</nav>


<div class="top-button">

<button onclick="openLogin()">로그인</button>

<button onclick="openSignup()">회원가입</button>

</div>


</header>




<section class="main">


<h2>Welcome</h2>

<p>
새로운 서비스를 시작하세요.
</p>


<div class="cards">


<div class="card">

<h3>서비스 1</h3>

<p>
첫 번째 기능입니다.
</p>

</div>



<div class="card">

<h3>서비스 2</h3>

<p>
두 번째 기능입니다.
</p>

</div>



<div class="card">

<h3>서비스 3</h3>

<p>
세 번째 기능입니다.
</p>

</div>



</div>


</section>





<!-- 회원가입 창 -->


<div id="signupBox" class="popup">


<h2>회원가입</h2>


<input id="username" placeholder="아이디">


<input id="password" type="password" placeholder="비밀번호">


<button onclick="signup()">
가입하기
</button>


<button onclick="closeBox()">
닫기
</button>


</div>





<!-- 로그인 창 -->


<div id="loginBox" class="popup">


<h2>로그인</h2>


<input placeholder="아이디">


<input type="password" placeholder="비밀번호">


<button>
로그인
</button>


<button onclick="closeBox()">
닫기
</button>


</div>




<script src="script.js"></script>


</body>

</html>
